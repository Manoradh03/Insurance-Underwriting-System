spring.application.name=Insurance Underwriting System

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/insurance_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Server =====
server.port=8080

# ===== JWT =====
app.jwt.secret=ThisIsASuperSecretKeyForJwtSigningPleaseChangeInProduction1234567890
app.jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.org.springframework.security=INFO


spring.jpa.open-in-view=false
